<div class="fundo-primary flex flex-col items-center">
  <div class="flex h-screen w-screen flex-col justify-center gap-4 p-4">
    <!-- Header -->
    <div class="flex flex-col items-center gap-2">
      <div class="bg-primary text-primary-contrast rounded-xl p-4">
        <svg lucideWallet class="size-10"></svg>
      </div>

      <h2 class="text-2xl font-bold">Bem-Vindo!</h2>

      <p class="pr-1 pl-1 text-center text-sm">
        Registre-se para criar a sua conta e gerenciar suas finanças
      </p>
    </div>

    <!-- Card inputs -->
    <div class="flex flex-col items-center gap-4 rounded-xl bg-white p-4 shadow">
      <p-inputGroup>
        <p-inputgroup-addon>
          <svg lucideUser></svg>
        </p-inputgroup-addon>

        <p-floatlabel variant="on">
          <input id="username" type="text" pInputText [(ngModel)]="username" />
          <label for="username">Nome</label>
        </p-floatlabel>
      </p-inputGroup>
      <p-inputGroup>
        <p-inputgroup-addon>
          <svg lucideCalendar></svg>
        </p-inputgroup-addon>

        <p-floatlabel variant="on">
          <input id="birthDate" type="date" pInputText [(ngModel)]="birthDate" />
          <label for="birthDate">Data de Nascimento</label>
        </p-floatlabel>
      </p-inputGroup>

      <p-inputGroup>
        <p-inputgroup-addon>
          <svg lucideDollarSign></svg>
        </p-inputgroup-addon>

        <p-floatlabel variant="on">
          <input id="saldo-mensal" type="number" pInputText [(ngModel)]="saldoMensal" />
          <label for="saldo-mensal">Renda Mensal</label>
        </p-floatlabel>
      </p-inputGroup>

      <p-inputGroup>
        <p-inputgroup-addon>
          <svg lucideDollarSign></svg>
        </p-inputgroup-addon>

        <p-floatlabel variant="on">
          <input id="limite-gastos" type="number" pInputText [(ngModel)]="limiteGastos" />
          <label for="limite-gastos">Limite de Gastos Mensais</label>
        </p-floatlabel>
      </p-inputGroup>

      <p-inputGroup>
        <p-inputgroup-addon>
          <svg lucideMail></svg>
        </p-inputgroup-addon>

        <p-floatlabel variant="on">
          <input id="email" pInputText [(ngModel)]="email" />
          <label for="email">Email</label>
        </p-floatlabel>
      </p-inputGroup>

      <p-inputgroup>
        <p-inputgroup-addon>
          <svg lucideLockKeyhole></svg>
        </p-inputgroup-addon>

        <p-floatlabel variant="on">
          <p-password
            id="senha"
            [toggleMask]="true"
            autocomplete="off"
            [feedback]="false"
            [(ngModel)]="senha"
            [pt]="{
              maskIcon: { class: '!z-10' },
              unmaskIcon: { class: '!z-10' },
            }"
          />
          <label for="senha">Senha</label>
        </p-floatlabel>
      </p-inputgroup>

      <p-inputgroup>
        <p-inputgroup-addon>
          <svg lucideLockKeyhole></svg>
        </p-inputgroup-addon>

        <p-floatlabel variant="on">
          <p-password
            id="senhaConf"
            [toggleMask]="true"
            autocomplete="off"
            [feedback]="false"
            [(ngModel)]="senhaConf"
            [pt]="{
              maskIcon: { class: '!z-10' },
              unmaskIcon: { class: '!z-10' },
            }"
          />
          <label for="senhaConf">Confirmar Senha</label>
        </p-floatlabel>
      </p-inputgroup>

      <button pButton class="bg-primary mt-3 w-full">Registrar</button>
    </div>

    <p class="text-center text-sm">
      Já possui uma conta?
      <a class="text-blue-600" routerLink="/criarConta">Faça login</a>
    </p>
  </div>
</div>
